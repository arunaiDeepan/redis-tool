[defaults]
inventory                  = inventory/hosts.ini
roles_path                 = roles
host_key_checking          = False
retry_files_enabled        = False
stdout_callback            = default
forks                      = 6
gathering                  = smart
fact_caching               = jsonfile
fact_caching_connection    = .ansible-facts
fact_caching_timeout       = 600
interpreter_python         = /usr/bin/python3
deprecation_warnings       = False
localhost_warning          = False
# When redis-tool launches us, it passes --extra-vars; we want any of those
# placed on the command line to win over inventory or role defaults.
hash_behaviour             = replace

[ssh_connection]
# Pipelining cuts ~30% off task latency. Safe because we don't use sudo with
# requiretty in the containers.
pipelining                 = True
control_path               = %(directory)s/%%h-%%p-%%r
ssh_args                   = -o ControlMaster=auto -o ControlPersist=60s -o ServerAliveInterval=15 -o ConnectTimeout=10 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null

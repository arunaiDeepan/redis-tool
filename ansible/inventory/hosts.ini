# Ansible reaches each node via the host's published SSH port (127.0.0.1:221X).
# The 10.10.0.1X address is the node's address ON THE CONTAINER NETWORK and is
# only ever used by Redis itself (cluster-announce-ip, cluster bus, replication).
#
# Roles (master/replica) are deliberately NOT encoded here - `redis-cli --cluster
# create` assigns them at provision time, and CLUSTER FAILOVER swaps them during
# upgrade. Topology is always discovered at runtime from `CLUSTER NODES`.

[redis_nodes]
redis-node-1 ansible_host=127.0.0.1 ansible_port=2211 node_ip=10.10.0.11
redis-node-2 ansible_host=127.0.0.1 ansible_port=2212 node_ip=10.10.0.12
redis-node-3 ansible_host=127.0.0.1 ansible_port=2213 node_ip=10.10.0.13
redis-node-4 ansible_host=127.0.0.1 ansible_port=2214 node_ip=10.10.0.14
redis-node-5 ansible_host=127.0.0.1 ansible_port=2215 node_ip=10.10.0.15
redis-node-6 ansible_host=127.0.0.1 ansible_port=2216 node_ip=10.10.0.16

[redis_nodes:vars]
ansible_user=root
ansible_ssh_private_key_file=~/.ssh/redis_tool_id_ed25519
ansible_python_interpreter=/usr/bin/python3

# The "seed" node we delegate cluster-create / seed / verify tasks to.
# Any one node works; node-1 is the convention.
[seed]
redis-node-1

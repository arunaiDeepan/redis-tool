---
# Verify by independently recomputing sha256("key:NNNN") and comparing to GET.
# Counts missing vs mismatched separately so the failure report is informative.

- name: Verify {{ keys_count | default(1000) }} deterministic keys
  hosts: seed
  gather_facts: false
  vars:
    keys_count: 1000
    verify_script_dest: /tmp/redis_verify.sh
    verify_result_path: /tmp/redis_verify_result.json
  tasks:
    - name: Push verify shell script
      ansible.builtin.copy:
        dest: "{{ verify_script_dest }}"
        mode: "0755"
        # Jinja-substituted values are hoisted to bash vars at the top so the
        # body can live inside {% raw %}…{% endraw %}. Required because bash
        # ${#VAR} (string length) collides with Jinja's {# … #} comment syntax.
        content: |
          #!/usr/bin/env bash
          set -euo pipefail
          COUNT="${1:-1000}"
          HOST="127.0.0.1"
          PORT="{{ redis_port }}"
          REDIS_CLI="{{ redis_install_prefix }}/bin/redis-cli"
          RESULT_PATH="{{ verify_result_path }}"
          {% raw %}
          OK=0
          MISSING=0
          MISMATCH=0
          MISSES=""
          for i in $(seq 1 "$COUNT"); do
            key=$(printf "key:%04d" "$i")
            expected=$(printf "%s" "$key" | sha256sum | awk '{print $1}')
            got=$("$REDIS_CLI" -c -h "$HOST" -p "$PORT" GET "$key" || true)
            if [[ -z "$got" ]]; then
              MISSING=$((MISSING+1))
              [[ ${#MISSES} -lt 200 ]] && MISSES="$MISSES $key"
            elif [[ "$got" != "$expected" ]]; then
              MISMATCH=$((MISMATCH+1))
              [[ ${#MISSES} -lt 200 ]] && MISSES="$MISSES $key"
            else
              OK=$((OK+1))
            fi
          done
          printf '{"verified":%d,"missing":%d,"mismatched":%d,"total":%d,"sample_failures":"%s"}\n' \
            "$OK" "$MISSING" "$MISMATCH" "$COUNT" "$(echo "$MISSES" | sed 's/"/\\"/g')" > "$RESULT_PATH"
          {% endraw %}

    - name: Execute verify
      ansible.builtin.command: "{{ verify_script_dest }} {{ keys_count }}"
      register: verify_run
      changed_when: false

    - name: Read verify result
      ansible.builtin.slurp:
        src: "{{ verify_result_path }}"
      register: verify_result_b64

    - name: Ensure control-node output dir exists
      ansible.builtin.file:
        path: "{{ status_output_dir }}"
        state: directory
        mode: "0755"
      delegate_to: localhost
      become: false

    - name: Write verify report to control node
      ansible.builtin.copy:
        dest: "{{ status_output_dir }}/verify.json"
        mode: "0644"
        content: "{{ (verify_result_b64.content | b64decode | from_json) | to_nice_json }}"
      delegate_to: localhost
      become: false
